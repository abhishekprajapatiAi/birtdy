<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Mummy jii 🎉</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: radial-gradient(circle at bottom, #14001f, #000);
        }

        /* 🌟 Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from {opacity: 0.2;}
            to {opacity: 1;}
        }

        /* 🎈 Balloons */
        .balloon {
            position: absolute;
            width: 70px;
            height: 90px;
            border-radius: 50%;
            bottom: -120px;
            animation: floatUp linear infinite;
        }

        .balloon::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 50px;
            background: white;
            left: 50%;
            top: 90px;
        }

        @keyframes floatUp {
            0% {transform: translateY(0);}
            100% {transform: translateY(-120vh);}
        }

        /* ✨ Neon Title */
        h1 {
            margin-top: 70px;
            font-size: 65px;
            font-family: 'Pacifico', cursive;
            color: #ff7bff;
            text-shadow: 0 0 10px #ff00ff,
                         0 0 30px #ff00ff,
                         0 0 60px #ff00ff;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {text-shadow: 0 0 10px #ff00ff;}
            to {text-shadow: 0 0 40px #ff00ff;}
        }

        img {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00ff;
            margin-top: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% {transform: translateY(0);}
            50% {transform: translateY(-15px);}
        }

        h2 {
            font-weight: 300;
            font-size: 30px;
        }

        #msg {
            font-size: 24px;
            margin-top: 10px;
            color: #ffd6ff;
        }

        /* ✨ Sparkles */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: gold;
            border-radius: 50%;
            animation: sparkle 1.5s infinite;
        }

        @keyframes sparkle {
            0% {opacity: 0; transform: scale(0);}
            50% {opacity: 1; transform: scale(1);}
            100% {opacity: 0; transform: scale(0);}
        }

    </style>
</head>

<body onclick="playMusic()">

    <h1>💖Happy Birthday Mummy!💖</h1>

    <img src="friend.jpg">

    <h2>Meri Pyari Mummy 💖</h2>

    <p id="msg">You are my biggest strength, my guide, and my home. <br>Thank you for always being there for me. I love you so much!</br>🎉</p>

    <!-- 🎵 Music -->
    <audio id="music" loop>
        <source src="birthday.mp3">
    </audio>

<script>
    function playMusic(){
        document.getElementById("music").play();
    }

    /* 🌟 Stars */
    for(let i=0;i<150;i++){
        let s=document.createElement("div");
        s.className="star";
        s.style.top=Math.random()*100+"vh";
        s.style.left=Math.random()*100+"vw";
        s.style.animationDuration=(1+Math.random()*2)+"s";
        document.body.appendChild(s);
    }

    /* 🎈 Balloons */
    let colors=["#ff4b5c","#ffcc00","#00e6e6","#ff66ff","#66ff66","#ff884d"];

    for(let i=0;i<12;i++){
        let b=document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"vw";
        b.style.background=colors[Math.floor(Math.random()*colors.length)];
        b.style.animationDuration=(6+Math.random()*6)+"s";
        document.body.appendChild(b);
    }

    /* ✨ Sparkles */
    for(let i=0;i<60;i++){
        let sp=document.createElement("div");
        sp.className="sparkle";
        sp.style.top=Math.random()*100+"vh";
        sp.style.left=Math.random()*100+"vw";
        sp.style.animationDelay=Math.random()*2+"s";
        document.body.appendChild(sp);
    }

</script>

</body>
</html>
